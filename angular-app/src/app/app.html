<div class="page-background">
  <div cdkDropListGroup class="board-wrapper">
    
    <div cdkDropList 
         cdkDropListOrientation="horizontal" 
         (cdkDropListDropped)="dropColumn($event)" 
         class="columns-header-row">
      
      <div class="swimlane-label-spacer">Osoba</div>

      <div class="column-header-container" 
           *ngFor="let col of columns" 
           cdkDrag>
        
        <div class="column-header" 
             cdkDragHandle
             [class.over-limit]="isOverLimit(col)">
          
          <h2 *ngIf="editingColumn !== col" (dblclick)="!isImmutable(col) && startEditColumn(col)">
            {{ col.title }}
          </h2>

          <input *ngIf="editingColumn === col"
                 #columnInput
                 type="text"
                 [value]="col.title"
                 (blur)="saveColumnTitle(col, columnInput.value)"
                 (keydown.enter)="columnInput.blur()"
                 class="edit-input" />

          <button *ngIf="!isImmutable(col)" class="delete-col-btn" (click)="removeColumn(col.id)">✕</button>
        </div>
        
        <div class="wip-limit-display">
          Limit: <input type="number" [value]="col.limit" (change)="updateLimit(col, $any($event.target).value)" />
        </div>
      </div>

      <div class="add-column-wrapper">
        <button class="add-column-btn" (click)="addColumn()">+ List</button>
      </div>
    </div>

    <div class="swimlane-row" *ngFor="let swim of swimlanes">
      
      <div class="swimlane-side-label">
        {{ swim.name }}
      </div>

      <div class="grid-cell" *ngFor="let col of columns">
        <div cdkDropList
             [id]="getCellId(col.id, swim.id)"
             [cdkDropListData]="getTasksForCell(col.id, swim.id)"
             [cdkDropListConnectedTo]="allCellIds"
             class="example-list"
             (cdkDropListDropped)="drop($event, col.id, swim.id)">

          <div class="example-box"
               *ngFor="let task of getTasksForCell(col.id, swim.id)"
               cdkDrag 
               [cdkDragData]="task">

            <span>{{ task.content }}</span>

            <div class="task-actions">
              <button class="delete-btn" (click)="removeItem(task.id)">✕</button>
            </div>
          </div>

          <div class="add-item-mini">
            <input #taskIn type="text" placeholder="..." (keydown.enter)="addItem(col.id, swim.id, taskIn.value); taskIn.value=''"/>
            <button (click)="addItem(col.id, swim.id, taskIn.value); taskIn.value=''">+</button>
          </div>
          
        </div>
      </div>
    </div>

  </div>
</div>
