<div class="page-background">
  <div cdkDropListGroup class="board-wrapper">

    <div cdkDropList 
        cdkDropListOrientation="horizontal" 
        (cdkDropListDropped)="dropColumn($event)" 
        class="columns-container">

      <div class="example-container" 
          *ngFor="let col of columns; let ci = index" 
          cdkDrag>

        <div class="column-header" cdkDragHandle>
          <h2 *ngIf="editingColumn !== col" (dblclick)="!isImmutable(col) && startEditColumn(col)">
            {{ col.title }}
          </h2>

          <input *ngIf="editingColumn === col"
              #columnInput
              type="text"
              [value]="col.title"
              (blur)="saveColumnTitle(col, columnInput.value)"
              (keydown.enter)="columnInput.blur()"
              (keydown.escape)="editingColumn = null"
              (mousedown)="$event.stopPropagation()" 
              class="edit-input" />

          <button *ngIf="!isImmutable(col)"class="delete-col-btn" (click)="removeColumn(col.id)">✕</button>
        </div>

        <div cdkDropList
            [id]="col.id.toString()"
            [cdkDropListData]="col.items"
            [cdkDropListConnectedTo]="connectedLists"
            class="example-list"
            (cdkDropListDropped)="drop($event)"
            [class.over-limit]="isOverLimit(col)">

          <div class="example-box"
              *ngFor="let item of col.items; let i = index"
              cdkDrag>

            <span *ngIf="!(editingTask?.col === col && editingTask?.index === i)"
                  (dblclick)="startEditTask(col, i)">
              {{ item.content }}
            </span>

            <input *ngIf="editingTask?.col === col && editingTask?.index === i"
                  type="text"
                  [value]="item.content"
                  (blur)="saveTask(col, i, $any($event.target).value)"
                  (keydown.enter)="saveTask(col, i, $any($event.target).value)"
                  autofocus
                  class="edit-input" />

            <div class="task-actions">
              <button class="delete-btn" (click)="removeItem(col, i)">✕</button>
            </div>
          </div>
        </div>

        <div class="add-item">
          <input #taskInput type="text" placeholder="New task..." />
          <button (click)="addItem(col, taskInput.value); taskInput.value=''">
            Add
          </button>
        </div>

        <div class="wip-limit">
          <span>WIP limit:</span>
          <input type="number" [value]="col.limit" (change)="updateLimit(col, $any($event.target).value)" />
        </div>

      </div>

      <div class="add-column-wrapper">
        <button class="add-column-btn" (click)="addColumn()">Add new list</button>
      </div>

    </div>
  </div>
</div>
